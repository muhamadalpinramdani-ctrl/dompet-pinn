<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dompetpin - Sistem Tabungan & Pantau Bulanan</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: #ffffff; padding: 20px; border-radius: 15px; box-shadow: 0px 4px 10px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin-bottom: 15px; color: #2c3e50; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* Dashboard Saldo Utama */
        .dashboard { background: linear-gradient(135deg, #1abc9c, #16a085); color: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; position: relative; }
        .dashboard h3 { font-size: 24px; margin-top: 5px; }
        .sensor-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 4px 8px; border-radius: 5px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .mini-info { display: flex; justify-content: space-between; margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 8px; font-size: 13px; }

        /* Dashboard Tabungan Khusus */
        .saving-dashboard { background: linear-gradient(135deg, #f1c40f, #f39c12); color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .saving-dashboard h3 { font-size: 24px; margin-top: 5px; }
        .saving-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-saving-action { padding: 8px; background: rgba(255,255,255,0.25); border: none; border-radius: 5px; color: white; font-weight: bold; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .btn-saving-action:hover { background: rgba(255,255,255,0.4); }
        .btn-span-full { grid-column: span 2; background: rgba(255, 255, 255, 0.4); }

        .filter-section { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; justify-content: space-between; }
        .filter-section select { padding: 6px; font-size: 14px; border-radius: 5px; }

        .analytics-box { background: #fdfdfd; border: 1px solid #eef2f5; padding: 12px; border-radius: 10px; margin-bottom: 20px; }
        .analytics-title { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #7f8c8d; display: flex; align-items: center; gap: 6px; }
        .chart-row { margin-bottom: 8px; font-size: 13px; }
        .chart-label { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .chart-bar-bg { background: #eee; height: 6px; border-radius: 5px; overflow: hidden; }
        .chart-bar-fill { background: #e74c3c; height: 100%; width: 0%; }

        .tabs { display: flex; margin-bottom: 15px; gap: 10px; }
        .tab-btn { flex: 1; padding: 10px; background: #eee; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #555; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .tab-btn.active { background: #3498db; color: white; }
        
        .form-group { margin-bottom: 12px; }
        label { font-size: 13px; font-weight: bold; display: block; margin-bottom: 4px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; outline: none; }
        
        button.btn-main { width: 100%; padding: 12px; background-color: #2ecc71; border: none; color: white; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; }

        .history-section { margin-top: 25px; }
        .history-title { font-size: 15px; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 5px; color: #555; }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; }
        .item-pengeluaran { border-left: 5px solid #e74c3c; }
        .item-pemasukan { border-left: 5px solid #2ecc71; }
        .item-tabungan { border-left: 5px solid #f39c12; }
        
        .list-item .info { display: flex; flex-direction: column; }
        .list-item .category { font-weight: bold; }
        .list-item .note { font-size: 11px; color: #95a5a6; margin-top: 2px; }
        .list-item .date { font-size: 10px; color: #7f8c8d; }
        
        .amount-pengeluaran { font-weight: bold; color: #e74c3c; }
        .amount-pemasukan { font-weight: bold; color: #2ecc71; }
        .amount-tabungan { font-weight: bold; color: #f39c12; }
        
        .action-container { display: flex; align-items: center; gap: 5px; }
        .btn-action { background: none; border: none; cursor: pointer; font-weight: bold; font-size: 12px; padding: 2px 5px; }
        .btn-edit { color: #2980b9; }
        .btn-delete { color: #c0392b; }
        
        /* SVG Icon Helper Style */
        .icon-svg { width: 14px; height: 14px; fill: currentColor; vertical-align: middle; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <h2>
        <svg class="icon-svg" style="width:24px; height:24px;" viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5|c.67 0 1.5.67 1.5 1.5-.67 1.5-1.5 1.5-1.5 1.5z"/></svg> 
        Dompetku
    </h2>
    
    <!-- Dashboard Saldo Utama (Reset Visual per Bulan) -->
    <div class="dashboard">
        <button class="sensor-btn" onclick="toggleSensor()" id="sensor-btn-text">
            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            Sembunyikan
        </button>
        <p>Sisa Saldo Utama Bulan Ini</p>
        <h3 id="saldo-display">Rp 0</h3>
        <div class="mini-info">
            <div>Masuk: <span id="masuk-display">Rp 0</span></div>
            <div>Keluar: <span id="keluar-display">Rp 0</span></div>
        </div>
    </div>

    <!-- Dashboard Saldo Tabungan (Abadi, Tidak Ter-reset Bulanan) -->
    <div class="saving-dashboard">
        <p>&#128274; Total Kantong Tabungan (Abadi)</p>
        <h3 id="tabungan-display">Rp 0</h3>
        <p id="target-display" style="font-size:11px; margin-top:4px; opacity:0.9;">Target Alokasi Bulan Ini: Rp 0</p>
        <div class="saving-actions">
            <button class="btn-saving-action btn-span-full" onclick="tambahTabunganManual()" style="font-size: 13px; background-color: #27ae60;">&#10133; Tambah Tabungan</button>
            <button class="btn-saving-action" onclick="setTargetTabungan()">&#127919; Atur Target</button>
            <button class="btn-saving-action" onclick="pinjamTabungan()">&#128680; Pinjam Darurat</button>
            <button class="btn-saving-action btn-span-full" onclick="pindahSisaKeTabungan()">&#128176; Amankan Sisa Saldo</button>
        </div>
    </div>

    <!-- Pemantau Bulan -->
    <div class="filter-section">
        <label for="month-filter" style="font-weight:bold;">Pantau Catatan:</label>
        <select id="month-filter" onchange="updateTampilan()"></select>
    </div>

    <!-- Grafik Mini -->
    <div class="analytics-box">
        <p class="analytics-title">
            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
            Pembagian Beban Pengeluaran
        </p>
        <div id="analytics-chart"></div>
    </div>

    <!-- Form Input Transaksi -->
    <div class="tabs">
        <button id="tab-keluar" class="tab-btn active" onclick="setMode('keluar')">&#128184; Pengeluaran</button>
        <button id="tab-masuk" class="tab-btn" onclick="setMode('masuk')">&#128181; Pemasukan / Gaji</button>
    </div>

    <input type="hidden" id="edit-index" value="-1">

    <div class="form-group">
        <label for="amount">Nominal (Rp)</label>
        <input type="number" id="amount" placeholder="Contoh: 50000" required>
    </div>

    <div id="kategori-container" class="form-group">
        <label for="category">Kategori</label>
        <select id="category">
            <option value="Makanan">&#127828; Makanan & Minuman</option>
            <option value="Bensin">&#9981; Bensin / Transportasi</option>
            <option value="Jajan">&#127916; Jajan / Hiburan</option>
            <option value="Kebutuhan">&#128722; Kebutuhan Pokok</option>
            <option value="Lainnya">&#128230; Lain-lain</option>
        </select>
    </div>

    <div class="form-group">
        <label for="note">Keterangan</label>
        <input type="text" id="note" placeholder="Contoh: Beli Makan Malam">
    </div>

    <button id="submit-btn" class="btn-main" onclick="simpanData()">Simpan Catatan</button>

    <!-- Riwayat Transaksi -->
    <div class="history-section">
        <p class="history-title">Riwayat Transaksi Bulan Ini</p>
        <div id="history-list"></div>
    </div>
</div>

<script>
    let transaksiData = JSON.parse(localStorage.getItem('keuanganMasterData')) || [];
    let saldoTabungan = parseInt(localStorage.getItem('saldoTabunganAbadi')) || 0;
    let targetTabunganBulanan = JSON.parse(localStorage.getItem('targetTabunganBulanan')) || {};

    let currentMode = 'keluar';
    let isSensored = false;
    const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

    function buatPilihanBulan() {
        const filterSelect = document.getElementById('month-filter');
        filterSelect.innerHTML = '';
        const d = new Date();
        const bulanSekarang = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        
        let daftarBulanUnik = new Set();
        daftarBulanUnik.add(bulanSekarang);
        
        transaksiData.forEach(item => {
            daftarBulanUnik.add(item.waktu.substring(0, 7));
        });

        Array.from(daftarBulanUnik).sort().reverse().forEach(bln => {
            const [tahun, bulanIdx] = bln.split('-');
            const opsi = document.createElement('option');
            opsi.value = bln;
            opsi.innerText = `${namaBulan[parseInt(bulanIdx) - 1]} ${tahun}`;
            filterSelect.appendChild(opsi);
        });
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('tab-keluar').classList.toggle('active', mode === 'keluar');
        document.getElementById('tab-masuk').classList.toggle('active', mode === 'masuk');
        document.getElementById('kategori-container').style.display = mode === 'keluar' ? 'block' : 'none';
    }

    function toggleSensor() {
        isSensored = !isSensored;
        const sBtn = document.getElementById('sensor-btn-text');
        if(isSensored) {
            sBtn.innerHTML = `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0-4.5c-5 0-9.27 3.11-11 7.5 1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg> Tampilkan`;
        } else {
            sBtn.innerHTML = `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg> Sembunyikan`;
        }
        updateTampilan();
    }

    function updateTampilan() {
        const listKonten = document.getElementById('history-list');
        const saldoDisplay = document.getElementById('saldo-display');
        const masukDisplay = document.getElementById('masuk-display');
        const keluarDisplay = document.getElementById('keluar-display');
        const tabunganDisplay = document.getElementById('tabungan-display');
        const targetDisplay = document.getElementById('target-display');
        const bulanTerpilih = document.getElementById('month-filter').value;
        
        listKonten.innerHTML = '';
        
        let totalMasukBulanIni = 0;
        let totalKeluarBulanIni = 0;
        let kategoriKeluaran = { "Makanan": 0, "Bensin": 0, "Jajan": 0, "Kebutuhan": 0, "Lainnya": 0 };

        transaksiData.forEach((item, index) => {
            const nominalInt = parseInt(item.nominal);
            const bulanItem = item.waktu.substring(0, 7);

            if (bulanItem === bulanTerpilih) {
                if(item.tipe === 'masuk') totalMasukBulanIni += nominalInt;
                else if(item.tipe === 'keluar') {
                    totalKeluarBulanIni += nominalInt;
                    if(kategoriKeluaran[item.kategori] !== undefined) kategoriKeluaran[item.kategori] += nominalInt;
                } else if(item.tipe === 'tabung_out') {
                    totalKeluarBulanIni += nominalInt; 
                } else if(item.tipe === 'pinjam_in') {
                    totalMasukBulanIni += nominalInt; 
                }

                // Render Item
                let kelasItem = 'item-pengeluaran';
                let kelasWarnaUang = 'amount-pengeluaran';
                let tanda = '-';
                let infoKategori = item.kategori;

                if (item.tipe === 'masuk') { kelasItem = 'item-pemasukan'; kelasWarnaUang = 'amount-pemasukan'; tanda = '+'; infoKategori = '&#128181; Pemasukan'; }
                if (item.tipe === 'tabung_out') { kelasItem = 'item-tabungan'; kelasWarnaUang = 'amount-tabungan'; tanda = '&#10142;'; infoKategori = '&#128274; Masuk Tabungan'; }
                if (item.tipe === 'pinjam_in') { kelasItem = 'item-pemasukan'; kelasWarnaUang = 'amount-pemasukan'; tanda = '&#128220;'; infoKategori = '&#128680; Pinjam Dana Tabungan'; }

                // Peta logo kategori aman
                if(item.tipe === 'keluar') {
                    if(item.kategori === 'Makanan') infoKategori = '&#127828; Makanan';
                    if(item.kategori === 'Bensin') infoKategori = '&#9981; Bensin';
                    if(item.kategori === 'Jajan') infoKategori = '&#127916; Jajan';
                    if(item.kategori === 'Kebutuhan') infoKategori = '&#128722; Kebutuhan';
                    if(item.kategori === 'Lainnya') infoKategori = '&#128230; Lain-lain';
                }

                const tglObj = new Date(item.waktu);
                listKonten.innerHTML += `
                    <div class="list-item ${kelasItem}">
                        <div class="info">
                            <span class="category">${infoKategori}</span>
                            <span class="note">${item.keterangan || '-'}</span>
                            <span class="date">&#128197; ${tglObj.getDate()} ${namaBulan[tglObj.getMonth()]}</span>
                        </div>
                        <div class="action-container">
                            <span class="${kelasWarnaUang}">${tanda} Rp ${nominalInt.toLocaleString('id-ID')}</span>
                            <button class="btn-action btn-edit" onclick="editItem(${index})">&#9998;</button>
                            <button class="btn-action btn-delete" onclick="hapusItem(${index})">&#10006;</button>
                        </div>
                    </div>
                `;
            }
        });

        let sisaSaldoBulanIni = totalMasukBulanIni - totalKeluarBulanIni;

        if(isSensored) {
            saldoDisplay.innerText = "Rp *******";
            tabunganDisplay.innerText = "Rp *******";
        } else {
            saldoDisplay.innerText = `Rp ${sisaSaldoBulanIni.toLocaleString('id-ID')}`;
            tabunganDisplay.innerText = `Rp ${saldoTabungan.toLocaleString('id-ID')}`;
        }

        masukDisplay.innerText = `Rp ${totalMasukBulanIni.toLocaleString('id-ID')}`;
        keluarDisplay.innerText = `Rp ${totalKeluarBulanIni.toLocaleString('id-ID')}`;
        
        let targetBulanIni = targetTabunganBulanan[bulanTerpilih] || 0;
        targetDisplay.innerText = `Target Alokasi Bulan Ini: Rp ${targetBulanIni.toLocaleString('id-ID')}`;

        // Render Chart
        const chartBox = document.getElementById('analytics-chart');
        chartBox.innerHTML = '';
        if (totalKeluarBulanIni === 0) {
            chartBox.innerHTML = `<p style="font-size:11px; color:#aaa; text-align:center;">Tidak ada pengeluaran belanja.</p>`;
        } else {
            for (let kat in kategoriKeluaran) {
                let jumlah = kategoriKeluaran[kat];
                let persen = Math.round((jumlah / totalKeluarBulanIni) * 100) || 0;
                if (jumlah > 0) {
                    let labelKatTeks = kat;
                    if(kat === 'Makanan') labelKatTeks = '&#127828; Makanan';
                    if(kat === 'Bensin') labelKatTeks = '&#9981; Bensin';
                    if(kat === 'Jajan') labelKatTeks = '&#127916; Jajan';
                    if(kat === 'Kebutuhan') labelKatTeks = '&#128722; Kebutuhan';
                    if(kat === 'Lainnya') labelKatTeks = '&#128230; Lainnya';

                    chartBox.innerHTML += `
                        <div class="chart-row"><div class="chart-label"><span>${labelKatTeks}</span><span><b>Rp ${jumlah.toLocaleString('id-ID')}</b> (${persen}%)</span></div>
                        <div class="chart-bar-bg"><div class="chart-bar-fill" style="width: ${persen}%;"></div></div></div>
                    `;
                }
            }
        }
    }

    function simpanData() {
        const nominal = document.getElementById('amount').value;
        const keterangan = document.getElementById('note').value;
        const kategori = document.getElementById('category').value;
        const editIndex = parseInt(document.getElementById('edit-index').value);

        if (nominal === '' || nominal <= 0) { alert('Isi nominal dengan benar!'); return; }

        const sekarang = new Date();
        const waktuISO = sekarang.getFullYear() + '-' + String(sekarang.getMonth() + 1).padStart(2, '0') + '-' + String(sekarang.getDate()).padStart(2, '0');

        if(editIndex > -1) {
            transaksiData[editIndex].nominal = nominal;
            transaksiData[editIndex].keterangan = keterangan;
            if(transaksiData[editIndex].tipe === 'keluar') transaksiData[editIndex].kategori = kategori;
            document.getElementById('edit-index').value = "-1";
            document.getElementById('submit-btn').innerText = "Simpan Catatan";
            document.getElementById('submit-btn').style.backgroundColor = "#2ecc71";
        } else {
            const dataBaru = {
                tipe: currentMode,
                nominal: nominal,
                keterangan: keterangan,
                kategori: currentMode === 'keluar' ? kategori : 'Pemasukan',
                waktu: waktuISO
            };
            transaksiData.unshift(dataBaru);
        }

        localStorage.setItem('keuanganMasterData', JSON.stringify(transaksiData));
        document.getElementById('amount').value = '';
        document.getElementById('note').value = '';
        updateTampilan();
    }

    function editItem(index) {
        const item = transaksiData[index];
        document.getElementById('amount').value = item.nominal;
        document.getElementById('note').value = item.keterangan;
        if(item.tipe === 'keluar' || item.tipe === 'masuk') {
            setMode(item.tipe);
            if(item.tipe === 'keluar') document.getElementById('category').value = item.kategori;
        }
        document.getElementById('edit-index').value = index;
        document.getElementById('submit-btn').innerText = "Update / Ganti Data";
        document.getElementById('submit-btn').style.backgroundColor = "#3498db";
    }

    function tambahTabunganManual() {
        const nominalTambah = prompt("Masukkan jumlah uang yang ingin dimasukkan ke Tabungan (Rp):");
        if(nominalTambah !== null && !isNaN(nominalTambah) && nominalTambah > 0) {
            
            const bulanTerpilih = document.getElementById('month-filter').value;
            let totalMasuk = 0; let totalKeluar = 0;
            transaksiData.forEach(item => {
                if(item.waktu.substring(0,7) === bulanTerpilih) {
                    if(item.tipe === 'masuk' || item.tipe === 'pinjam_in') totalMasuk += parseInt(item.nominal);
                    else totalKeluar += parseInt(item.nominal);
                }
            });
            let sisaSaldoUtama = totalMasuk - totalKeluar;

            if(parseInt(nominalTambah) > sisaSaldoUtama) {
                alert(`Gagal! Sisa saldo utama bulan ini (Rp ${sisaSaldoUtama.toLocaleString('id-ID')}) tidak cukup.`);
                return;
            }

            saldoTabungan += parseInt(nominalTambah);
            localStorage.setItem('saldoTabunganAbadi', saldoTabungan);

            const sekarang = new Date();
            transaksiData.unshift({
                tipe: 'tabung_out',
                nominal: nominalTambah,
                keterangan: 'Tambah tabungan manual',
                kategori: 'Tabungan',
                waktu: sekarang.getFullYear() + '-' + String(sekarang.getMonth() + 1).padStart(2, '0') + '-' + String(sekarang.getDate()).padStart(2, '0')
            });

            localStorage.setItem('keuanganMasterData', JSON.stringify(transaksiData));
            updateTampilan();
        }
    }

    function setTargetTabungan() {
        const bulanTerpilih = document.getElementById('month-filter').value;
        const target = prompt("Masukkan target nominal yang ingin ditabung bulan ini (Rp):");
        if(target !== null && !isNaN(target) && target > 0) {
            targetTabunganBulanan[bulanTerpilih] = parseInt(target);
            localStorage.setItem('targetTabunganBulanan', JSON.stringify(targetTabunganBulanan));
            updateTampilan();
        }
    }

    function pindahSisaKeTabungan() {
        const bulanTerpilih = document.getElementById('month-filter').value;
        let totalMasuk = 0; let totalKeluar = 0;
        
        transaksiData.forEach(item => {
            if(item.waktu.substring(0,7) === bulanTerpilih) {
                if(item.tipe === 'masuk' || item.tipe === 'pinjam_in') totalMasuk += parseInt(item.nominal);
                else totalKeluar += parseInt(item.nominal);
            }
        });

        let sisa = totalMasuk - totalKeluar;
        if(sisa <= 0) { alert("Tidak ada sisa uang bulan ini untuk ditabung."); return; }

        if(confirm(`Amankan sisa saldo sebesar Rp ${sisa.toLocaleString('id-ID')} ke dalam tabungan?`)) {
            saldoTabungan += sisa;
            localStorage.setItem('saldoTabunganAbadi', saldoTabungan);
            
            const sekarang = new Date();
            transaksiData.unshift({
                tipe: 'tabung_out',
                nominal: sisa,
                keterangan: 'Otomatisasi sisa akhir bulan',
                kategori: 'Tabungan',
                waktu: sekarang.getFullYear() + '-' + String(sekarang.getMonth() + 1).padStart(2, '0') + '-' + String(sekarang.getDate()).padStart(2, '0')
            });
            
            localStorage.setItem('keuanganMasterData', JSON.stringify(transaksiData));
            updateTampilan();
        }
    }

    function pinjamTabungan() {
        const jumlahPinjam = prompt("Masukkan jumlah pinjaman darurat dari tabungan (Rp):");
        if(jumlahPinjam !== null && !isNaN(jumlahPinjam) && jumlahPinjam > 0) {
            if(parseInt(jumlahPinjam) > saldoTabungan) { alert("Saldo tabunganmu tidak mencukupi untuk dipinjam sebesar itu!"); return; }
            
            saldoTabungan -= parseInt(jumlahPinjam);
            localStorage.setItem('saldoTabunganAbadi', saldoTabungan);

            const sekarang = new Date();
            transaksiData.unshift({
                tipe: 'pinjam_in',
                nominal: jumlahPinjam,
                keterangan: 'Pinjam dana darurat tabungan',
                kategori: 'Pemasukan',
                waktu: Thermal = sekarang.getFullYear() + '-' + String(sekarang.getMonth() + 1).padStart(2, '0') + '-' + String(sekarang.getDate()).padStart(2, '0')
            });

            localStorage.setItem('keuanganMasterData', JSON.stringify(transaksiData));
            updateTampilan();
        }
    }

    function hapusItem(index) {
        if(confirm("Hapus catatan transaksi ini?")) {
            const item = transaksiData[index];
            if(item.tipe === 'tabung_out') saldoTabungan -= parseInt(item.nominal);
            if(item.tipe === 'pinjam_in') saldoTabungan += parseInt(item.nominal);
            
            localStorage.setItem('saldoTabunganAbadi', saldoTabungan);
            transaksiData.splice(index, 1);
            localStorage.setItem('keuanganMasterData', JSON.stringify(transaksiData));
            updateTampilan();
        }
    }

    buatPilihanBulan();
    updateTampilan();
</script>
